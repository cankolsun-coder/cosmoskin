name = "cosmoskin"
compatibility_date = "2024-12-01"
pages_build_output_dir = "."

# Non-secret defaults may be configured in Cloudflare Pages Variables.
[vars]
ADMIN_ALLOW_LEGACY_TOKEN = "false"
ADMIN_SESSION_TTL_SECONDS = "1800"
SUPABASE_TIMEOUT_MS = "12000"
IYZICO_TIMEOUT_MS = "15000"
EFT_RESERVATION_MINUTES = "1440"

# Add all credentials with Cloudflare Pages secrets; see .env.example and
# COSMOSKIN_PRODUCTION_DEPLOYMENT_CHECKLIST.md. Never commit real values.
