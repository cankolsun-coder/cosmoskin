<!DOCTYPE html><html lang='tr'><head><title>COSMOSKIN | Sipariş Detayı</title><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><link href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap' rel='stylesheet'><script src='/assets/site-config.js'></script><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='/assets/js/account-api.js'></script><style>:root{--bg:#fbfaf7;--panel:#fffdfb;--line:#e7ddd3;--soft:#f4ece5;--text:#171412;--muted:#756b63;--serif:'Cormorant Garamond',serif;--sans:'Inter',sans-serif}*{box-sizing:border-box}body{margin:0;font-family:var(--sans);background:radial-gradient(circle at top right,rgba(238,221,203,.55),transparent 34%),var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.side{padding:28px 24px;border-right:1px solid var(--line);background:rgba(255,253,250,.72)}.brand{font-family:var(--serif);letter-spacing:.38em;font-size:24px;font-weight:500;margin-bottom:26px;display:block;line-height:1}.nav a{display:block;padding:10px 12px;border-radius:12px;color:#6e665f;font-size:13px}.nav a:hover,.nav a.active{background:#f1e8df;color:#111}.main{padding:28px}.hero{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,#fffdfb,#f8f1e9);padding:32px;margin-bottom:24px}h1{font-family:var(--serif);font-weight:500;font-size:48px;letter-spacing:-.035em;margin:0 0 8px}.muted{color:var(--muted)}.grid{display:grid;gap:16px}.card{border:1px solid var(--line);border-radius:20px;background:#fffdfb;padding:18px;box-shadow:0 14px 35px rgba(34,25,18,.045)}.btn{height:40px;border:0;border-radius:12px;background:#111;color:#fff;font-weight:600;padding:0 14px;cursor:pointer}.btn.soft{background:var(--soft);color:#5f554d}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;border-radius:12px;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}}</style></head><body><div class='app'><aside class='side'><a class='brand' href='/'>COSMOSKIN</a><nav class='nav'><a href='/account/profile.html'>Genel Bakış</a><a href='/account/orders.html' class='active'>Siparişlerim</a><a href='/account/routines.html'>Rutinlerim</a><a href='/account/rewards.html'>Puanlarım</a><a href='/account/personal-offers.html'>Kişisel Teklifler</a><a href='/account/activity.html'>Bildirimler</a><a href='/cart.html'>Sepet</a></nav></aside><main class='main'><section class='hero'><h1 id='orderNo'>Sipariş Detayı</h1><p class='muted' id='orderMeta'></p></section><section class='grid'><div class='card' id='items'></div><div class='card' id='summary'></div></section></main></div><div class='toast'></div><script>(async()=>{const id=new URLSearchParams(location.search).get('id');let d=await fetch('/api/orders').then(r=>r.json()).catch(()=>({data:{orders:[]}}));let o=(d.data?.orders||d.orders||[]).find(x=>String(x.id||x.order_id)===String(id))||(d.data?.orders||d.orders||[])[0];if(!o){items.textContent='Sipariş bulunamadı.';return;}orderNo.textContent=o.number||o.order_number;orderMeta.textContent=`${new Date(o.created_at||o.date).toLocaleDateString('tr-TR')} · ${o.status}`;items.innerHTML='<h2>Ürünler</h2>'+((o.items||[]).map(i=>`<p><img src='${i.image||i.image_url||'/assets/img/products/placeholder.png'}' style='width:42px;height:42px;object-fit:contain;vertical-align:middle'> ${i.name||i.product_name} · ${i.quantity||1} adet</p>`).join(''));summary.innerHTML=`<h2>Özet</h2><p>Toplam: <b>${new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:0}).format(o.total||o.total_amount||0)}</b></p><button class='btn' id='reorder'>Tekrar Sipariş Ver</button>`;reorder.onclick=async()=>{await fetch('/api/reorder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:o.id||o.order_id})});location.href='/cart.html'}})()</script></body></html>
