<!DOCTYPE html><html lang='tr'><head><title>COSMOSKIN | Rutinlerim</title><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><link href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap' rel='stylesheet'><script src='/assets/site-config.js'></script><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='/assets/js/account-api.js'></script><style>:root{--bg:#fbfaf7;--panel:#fffdfb;--line:#e7ddd3;--soft:#f4ece5;--text:#171412;--muted:#756b63;--serif:'Cormorant Garamond',serif;--sans:'Inter',sans-serif}*{box-sizing:border-box}body{margin:0;font-family:var(--sans);background:radial-gradient(circle at top right,rgba(238,221,203,.55),transparent 34%),var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.side{padding:28px 24px;border-right:1px solid var(--line);background:rgba(255,253,250,.72)}.brand{font-family:var(--serif);letter-spacing:.38em;font-size:24px;font-weight:500;margin-bottom:26px;display:block;line-height:1}.nav a{display:block;padding:10px 12px;border-radius:12px;color:#6e665f;font-size:13px}.nav a:hover,.nav a.active{background:#f1e8df;color:#111}.main{padding:28px}.hero{border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,#fffdfb,#f8f1e9);padding:32px;margin-bottom:24px}h1{font-family:var(--serif);font-weight:500;font-size:48px;letter-spacing:-.035em;margin:0 0 8px}.muted{color:var(--muted)}.grid{display:grid;gap:16px}.card{border:1px solid var(--line);border-radius:20px;background:#fffdfb;padding:18px;box-shadow:0 14px 35px rgba(34,25,18,.045)}.btn{height:40px;border:0;border-radius:12px;background:#111;color:#fff;font-weight:600;padding:0 14px;cursor:pointer}.btn.soft{background:var(--soft);color:#5f554d}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;border-radius:12px;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}}</style></head><body><div class='app'><aside class='side'><a class='brand' href='/'>COSMOSKIN</a><nav class='nav'><a href='/account/profile.html'>Genel Bakış</a><a href='/account/orders.html'>Siparişlerim</a><a href='/account/routines.html' class='active'>Rutinlerim</a><a href='/account/rewards.html'>Puanlarım</a><a href='/account/personal-offers.html'>Kişisel Teklifler</a><a href='/account/activity.html'>Bildirimler</a><a href='/cart.html'>Sepet</a></nav></aside><main class='main'><section class='hero'><h1>Rutinlerim</h1><p class='muted'>Sabah ve akşam bakım adımlarını takip et.</p><button class='btn' id='completeRoutine'>Rutini Tamamla</button></section><section class='grid' id='steps'></section></main></div><div class='toast'></div><script>(async()=>{let mode='morning';async function load(){let d=await fetch('/api/routines/today?mode='+mode).then(r=>r.json()).catch(()=>({data:{routine:{steps:[]}}}));let r=d.data?.routine||d.data?.todayRoutine||d.routine||{};let steps=r.steps||[];if(!steps.length){steps=[{title:'Temizleyici',description:'Cildi arındır',completed:true},{title:'Serum',description:'Aktif bakım',completed:true},{title:'Nemlendirici',description:'Bariyer desteği'},{title:'SPF',description:'Günlük koruma'}]}document.getElementById('steps').innerHTML=steps.map((s,i)=>`<article class='card'><b>${s.completed||s.is_completed?'✓ ':''}${s.title||s.name}</b><p class='muted'>${s.description||''}</p><button class='btn soft' data-step='${s.id||s.step_id||i}'>Tamamla</button></article>`).join('')}steps.onclick=async e=>{if(e.target.dataset.step){await fetch('/api/routines/complete-step',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step_id:e.target.dataset.step,routine_mode:mode})});load()}};completeRoutine.onclick=async()=>{await fetch('/api/routines/complete-routine',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({routine_mode:mode})});load()};load();})()</script></body></html>
