<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>COSMOSKIN · E-posta Doğrulama</title>
  <link rel="icon" href="/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-1: #fbf8f3;
      --bg-2: #f4efe8;
      --card: rgba(255, 253, 249, 0.94);
      --text: #181411;
      --muted: #6b645f;
      --soft-muted: #9a8e82;
      --gold: #b8a17a;
      --gold-border: #cdb88f;
      --black: #14110f;
      --line: rgba(237, 232, 226, 0.92);
      --success-bg: #f0f5ef;
      --error-bg: #fdf0ee;
      --shadow: 0 22px 60px rgba(19, 14, 10, 0.08);
      --button-shadow: 0 12px 28px rgba(20, 17, 15, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 50% 100%, rgba(210, 197, 178, 0.28), transparent 42%),
        radial-gradient(circle at 10% 12%, rgba(255, 255, 255, 0.82), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding:
        calc(env(safe-area-inset-top) + 26px)
        20px
        calc(env(safe-area-inset-bottom) + 30px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: auto -20% -18% -20%;
      height: 46%;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.44), transparent 58%),
        linear-gradient(135deg, rgba(216, 205, 190, 0.16), transparent 52%);
      filter: blur(2px);
    }

    .auth-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    .auth-brand {
      display: block;
      margin: 40px auto 38px;
      text-align: center;
      text-decoration: none;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(30px, 8vw, 40px);
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: #12100e;
      font-weight: 400;
      line-height: 1;
      padding-left: 0.34em;
      white-space: nowrap;
    }

    .auth-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 42px 24px 30px;
      text-align: center;
      overflow: hidden;
    }

    .auth-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 26px;
      border-radius: 50%;
      border: 1.5px solid var(--gold-border);
      background: var(--success-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      line-height: 1;
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
    }

    .auth-icon.loading {
      background: #f4ece3;
      color: var(--gold);
      font-size: 34px;
      animation: pulse 1.35s ease-in-out infinite;
    }

    .auth-icon.error {
      background: var(--error-bg);
      color: #8b1e17;
      border-color: rgba(139, 30, 23, 0.24);
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.56;
        transform: scale(0.97);
      }
    }

    .auth-eyebrow {
      margin: 0 0 18px;
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }

    .auth-title {
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(39px, 10.8vw, 52px);
      line-height: 1.04;
      font-weight: 400;
      letter-spacing: -0.025em;
      color: var(--text);
    }

    .auth-text {
      max-width: 326px;
      margin: 0 auto 30px;
      font-size: 17px;
      line-height: 1.72;
      color: var(--muted);
      font-weight: 400;
    }

    .auth-actions {
      display: none;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    .auth-btn {
      min-height: 58px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 0 24px;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-btn:active {
      transform: scale(0.985);
    }

    .auth-btn-primary {
      background: linear-gradient(180deg, #181411 0%, #0f0c0a 100%);
      color: #ffffff;
      box-shadow: var(--button-shadow);
    }

    .auth-btn-secondary {
      background: rgba(255, 255, 255, 0.72);
      color: #1a1614;
      border-color: var(--gold-border);
    }

    .auth-foot {
      display: none;
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--soft-muted);
      line-height: 1.7;
    }

    .auth-foot a {
      color: #8a6a4a;
      text-decoration: none;
    }

    .auth-debug {
      display: none;
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.5;
      color: rgba(107, 100, 95, 0.78);
      word-break: break-word;
    }

    @media (max-width: 390px) {
      body {
        padding-left: 16px;
        padding-right: 16px;
      }

      .auth-brand {
        margin-top: 34px;
        margin-bottom: 30px;
        letter-spacing: 0.28em;
        padding-left: 0.28em;
      }

      .auth-card {
        padding: 34px 20px 26px;
        border-radius: 30px;
      }

      .auth-icon {
        width: 82px;
        height: 82px;
        font-size: 42px;
        margin-bottom: 22px;
      }

      .auth-title {
        font-size: 38px;
      }

      .auth-text {
        font-size: 16px;
      }

      .auth-btn {
        min-height: 56px;
        font-size: 14px;
      }
    }
  </style>

</head>

<body>
  <main class="auth-shell">
    <a href="/index.html" class="auth-brand" aria-label="COSMOSKIN anasayfa">
      COSMOSKIN
    </a>

  </main>

  <script src="/assets/site-config.js?v=20260418a"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (async function () {
      const cfg = window.COSMOSKIN_CONFIG || {};

      const icon = document.getElementById('vIcon');
      const label = document.getElementById('vLabel');
      const heading = document.getElementById('vHeading');
      const text = document.getElementById('vText');
      const actions = document.getElementById('vActions');
      const foot = document.getElementById('vFoot');
      const debug = document.getElementById('vDebug');

      function setActions(html) {
        actions.style.display = 'flex';
        actions.innerHTML = html;
      }

      function showSuccess() {
        icon.textContent = '✓';
        icon.className = 'auth-icon';

        label.textContent = 'Doğrulama Tamamlandı';
        heading.innerHTML = 'E-postanız başarıyla<br>doğrulandı';
        text.textContent = 'COSMOSKIN hesabınız aktif. Aşağıdan giriş yaparak alışverişe başlayabilirsiniz.';

        setActions(`
          <a class="auth-btn auth-btn-primary" href="/index.html?openAuth=login">Giriş Yap</a>
          <a class="auth-btn auth-btn-secondary" href="/index.html">Anasayfaya Dön</a>
        `);

        foot.style.display = 'block';

        try {
          const cleanUrl = window.location.origin + window.location.pathname;
          window.history.replaceState({}, document.title, cleanUrl);
        } catch (_) {}
      }

      function showError(message) {
        icon.textContent = '×';
        icon.className = 'auth-icon error';

        label.textContent = 'Doğrulama Hatası';
        heading.innerHTML = 'Bir sorun<br>oluştu';
        text.textContent = message || 'Doğrulama bağlantısı geçersiz veya süresi dolmuş olabilir. Lütfen tekrar deneyin.';

        setActions(`
          <a class="auth-btn auth-btn-primary" href="/index.html">Anasayfaya Dön</a>
          <a class="auth-btn auth-btn-secondary" href="mailto:destek@cosmoskin.com.tr">Destek Al</a>
        `);

        foot.style.display = 'block';

        if (message) {
          debug.style.display = 'block';
          debug.textContent = message;
        }
      }

      try {
        if (!window.supabase) {
          throw new Error('Supabase kütüphanesi yüklenemedi.');
        }

        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          throw new Error('Supabase bağlantı ayarları eksik.');
        }

        const client = window.supabase.createClient(
          cfg.supabaseUrl,
          cfg.supabaseAnonKey,
          {
            auth: {
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: true
            }
          }
        );

        const url = new URL(window.location.href);
        const code = url.searchParams.get('code');

        if (code) {
          const { error } = await client.auth.exchangeCodeForSession(code);
          if (error) throw error;
        }

        const {
          data: { session },
          error: sessionError
        } = await client.auth.getSession();

        if (sessionError) throw sessionError;

        if (session) {
          showSuccess();
          return;
        }

        throw new Error('Oturum oluşturulamadı. Bağlantı süresi dolmuş veya daha önce kullanılmış olabilir.');
      } catch (error) {
        showError(error && error.message ? error.message : 'Doğrulama sırasında bir hata oluştu.');
      }
    })();
  </script>
