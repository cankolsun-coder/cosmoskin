name: Lighthouse CI

on:
  workflow_dispatch:

  pull_request:
    paths:
      - "**/*.html"
      - "assets/**"
      - "lighthouserc.json"
      - ".github/workflows/lighthouse.yml"

  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "assets/**"
      - "lighthouserc.json"
      - ".github/workflows/lighthouse.yml"

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse quality check
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli@0.15.x

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Save Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-reports
            .lighthouseci
          if-no-files-found: warn
          retention-days: 14

